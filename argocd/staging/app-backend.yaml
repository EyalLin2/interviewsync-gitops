apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: interviewsync-backend-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: chart from app repo, values from gitops repo
  # Requires ArgoCD >= 2.6 (shipped with argo-cd helm chart >= 5.x)
  sources:
    - repoURL: https://github.com/EyalLin2/InterviewSync
      targetRevision: main
      path: backend/charts
      helm:
        valueFiles:
          - $values/apps/staging/backend-values.yaml
    - repoURL: https://github.com/EyalLin2/interviewsync-gitops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
